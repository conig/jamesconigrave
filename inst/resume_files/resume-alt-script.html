<script>
(function() {
  function onReady(fn) {
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", fn);
    } else {
      fn();
    }
  }

  function directChildren(node, selector) {
    return Array.prototype.filter.call(node.children, function(child) {
      return child.matches(selector);
    });
  }

  function removeDirectHeading(node, text) {
    var heading = directChildren(node, "h1")[0];
    if (heading && (!text || heading.textContent.trim() === text)) {
      heading.remove();
    }
  }

  function moveChildren(from, to) {
    while (from.firstChild) {
      to.appendChild(from.firstChild);
    }
  }

  function hasRenderableContent(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      return node.textContent.trim().length > 0;
    }
    if (node.nodeType !== Node.ELEMENT_NODE) return false;
    if (node.matches("script, style")) return false;
    return node.textContent.trim().length > 0 || node.querySelector("img, svg, canvas, iframe");
  }

  var citationSectionIds = {
    "selected-funding": true,
    "software": true,
    "peer-reviewed-publications": true,
    "research-translation": true,
    "preprints": true,
    "presentations": true
  };

  function normalizeText(text) {
    return text
      .replace(/\s+/g, " ")
      .replace(/\s+([,.;:!?])/g, "$1")
      .trim();
  }

  function textBeforeNode(container, node) {
    if (!node) return normalizeText(container.textContent);
    var range = document.createRange();
    range.setStart(container, 0);
    range.setEndBefore(node);
    return normalizeText(range.cloneContents().textContent);
  }

  function fragmentBetween(container, startNode, endNode) {
    if (!startNode) return null;
    var range = document.createRange();
    range.setStartBefore(startNode);
    if (endNode) {
      range.setEndBefore(endNode);
    } else {
      range.setEnd(container, container.childNodes.length);
    }
    return range.cloneContents();
  }

  function highlightSelf(text) {
    var fragment = document.createDocumentFragment();
    var pattern = /JH Conigrave/g;
    var lastIndex = 0;
    var match;
    while ((match = pattern.exec(text)) !== null) {
      if (match.index > lastIndex) {
        fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
      }
      var self = document.createElement("span");
      self.className = "citation-self";
      self.textContent = match[0];
      fragment.appendChild(self);
      lastIndex = match.index + match[0].length;
    }
    if (lastIndex < text.length) {
      fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
    return fragment;
  }

  function cleanTitle(text) {
    return normalizeText(text).replace(/[.]\s*$/, "");
  }

  function isDateText(text) {
    return /^(Present|\d{4})(\s*-\s*(Present|\d{4}))?$/.test(text.trim());
  }

  function displayDateText(text) {
    var value = text.trim();
    var parts = value.split(/\s*-\s*/);
    if (parts.length !== 2) return value;

    var first = parts[0];
    var second = parts[1];
    if (first === "Present") return second + " - Present";
    if (second === "Present") return value;

    var firstYear = parseInt(first, 10);
    var secondYear = parseInt(second, 10);
    if (isFinite(firstYear) && isFinite(secondYear) && firstYear > secondYear) {
      return second + " - " + first;
    }

    return value;
  }

  function buildCitationBlock(heading) {
    var link = heading.querySelector("a");
    var firstVenueNode = heading.querySelector("em") || link;
    var leadingText = textBeforeNode(heading, firstVenueNode);
    var match = leadingText.match(/^(.*?)\s*\((\d{4})\)\.\s*(.*)$/);
    if (!match) return null;

    var authors = normalizeText(match[1]);
    var title = cleanTitle(match[3]);
    if (!title) return null;

    var block = document.createElement("div");
    block.className = "citation-main";

    var titleEl = document.createElement("h3");
    titleEl.className = "citation-title";
    titleEl.textContent = title;
    block.appendChild(titleEl);

    if (authors) {
      var authorsEl = document.createElement("div");
      authorsEl.className = "citation-authors";
      authorsEl.appendChild(highlightSelf(authors));
      block.appendChild(authorsEl);
    }

    if (firstVenueNode && firstVenueNode !== link) {
      var venueFragment = fragmentBetween(heading, firstVenueNode, link);
      if (venueFragment && normalizeText(venueFragment.textContent)) {
        var venueEl = document.createElement("div");
        venueEl.className = "citation-venue";
        venueEl.appendChild(venueFragment);
        block.appendChild(venueEl);
      }
    }

    if (link) {
      var identifier = document.createElement("div");
      identifier.className = "citation-identifier";
      identifier.appendChild(link.cloneNode(true));
      block.appendChild(identifier);
    }

    return block;
  }

  function metricize(metrics) {
    directChildren(metrics, "p").forEach(function(p) {
      var text = p.textContent.trim();
      var parts = text.split(":");
      if (parts.length < 2) return;
      var label = parts.shift().trim();
      var value = parts.join(":").trim();
      p.className = "metric";
      p.innerHTML = "";
      var valueEl = document.createElement("span");
      valueEl.className = "metric-value";
      valueEl.textContent = value;
      var labelEl = document.createElement("span");
      labelEl.className = "metric-label";
      labelEl.textContent = label;
      p.appendChild(valueEl);
      p.appendChild(labelEl);
    });
  }

  function buildRailIdentity() {
    var identity = document.createElement("div");
    identity.className = "rail-identity";
    var mark = document.createElement("div");
    mark.className = "rail-mark";
    mark.textContent = "JHC";
    var text = document.createElement("div");
    text.className = "rail-name";
    text.innerHTML = "<strong>James H. Conigrave</strong><span>Academic CV</span>";
    identity.appendChild(mark);
    identity.appendChild(text);
    return identity;
  }

  function buildHeroAction() {
    var action = document.createElement("a");
    action.className = "hero-download";
    action.href = "../jamesconigrave_resume.pdf";
    action.textContent = "Download PDF";
    return action;
  }

  function buildRailFooter(docinfo) {
    var footer = document.createElement("div");
    footer.className = "rail-footer";
    var updated = "";
    if (docinfo) {
      directChildren(docinfo, "p").forEach(function(p) {
        var text = p.textContent.trim();
        if (/^Updated:/i.test(text)) updated = text;
      });
    }
    footer.textContent = updated || "Updated daily";
    return footer;
  }

  function cleanEntry(entry, sectionId) {
    var paragraphs = directChildren(entry, "p");
    paragraphs.forEach(function(p) {
      if (p.textContent.trim() === "N/A") {
        p.remove();
      }
    });

    paragraphs = directChildren(entry, "p");
    var year = "";
    var dateParagraph = null;
    for (var i = paragraphs.length - 1; i >= 0; i -= 1) {
      if (isDateText(paragraphs[i].textContent.trim())) {
        dateParagraph = paragraphs[i];
        break;
      }
    }
    if (dateParagraph) {
      year = displayDateText(dateParagraph.textContent);
      dateParagraph.remove();
    }

    paragraphs = directChildren(entry, "p");
    paragraphs.forEach(function(p) {
      var text = p.textContent.trim();
      if (text.charCodeAt(0) === 8212 || text.indexOf("--") === 0) {
        p.classList.add("entry-note");
      }
    });

    var h3 = directChildren(entry, "h3")[0];
    var headingNode = h3;
    if (h3 && citationSectionIds[sectionId]) {
      var citationBlock = buildCitationBlock(h3);
      if (citationBlock) {
        entry.classList.add("citation-record");
        h3.replaceWith(citationBlock);
        headingNode = citationBlock;
      }
    }

    var body = document.createElement("div");
    body.className = "entry-body";
    if (headingNode) body.appendChild(headingNode);
    directChildren(entry, "p").forEach(function(p) {
      body.appendChild(p);
    });

    var date = document.createElement("div");
    date.className = "entry-year";
    date.textContent = year;

    entry.classList.add("resume-entry", "resume-reveal");
    entry.innerHTML = "";
    entry.appendChild(date);
    entry.appendChild(body);
  }

  function countLabel(count) {
    return count + (count === 1 ? " record" : " records");
  }

  function createSectionHeading(headingOrTitle, count) {
    var heading = document.createElement("div");
    heading.className = "section-heading";
    var headingDepth = document.createElement("div");
    headingDepth.className = "heading-depth";
    var kicker = document.createElement("span");
    kicker.className = "section-kicker";
    kicker.textContent = "00";
    var title = typeof headingOrTitle === "string" ?
      headingOrTitle :
      (headingOrTitle ? headingOrTitle.textContent.trim() : "");
    var h2 = typeof headingOrTitle === "string" ?
      document.createElement("h2") :
      headingOrTitle;
    if (typeof headingOrTitle === "string") h2.textContent = title;
    if (title.length > 22) heading.classList.add("is-long-heading");

    headingDepth.appendChild(kicker);
    if (h2) headingDepth.appendChild(h2);
    if (typeof count === "number" && count > 0) {
      var countEl = document.createElement("span");
      countEl.className = "section-count";
      countEl.textContent = countLabel(count);
      headingDepth.appendChild(countEl);
    }
    heading.appendChild(headingDepth);

    return {
      heading: heading,
      headingDepth: headingDepth
    };
  }

  function setRecordCount(section, count) {
    section.dataset.recordCount = String(count);
    var countEl = section.querySelector(".section-count");
    if (countEl) countEl.textContent = countLabel(count);
  }

  function applySectionDensity(section, count) {
    if (section.dataset.concise === "true") section.classList.add("is-concise");
    if (count > 6) section.classList.add("is-dense", "has-heading-depth");
  }

  function humanizeId(id) {
    return id
      .replace(/-/g, " ")
      .replace(/\b\w/g, function(letter) { return letter.toUpperCase(); });
  }

  function groupAltSections(main) {
    var groups = {};
    directChildren(main, ".resume-section").forEach(function(section) {
      var groupId = section.dataset.altGroup;
      if (!groupId) return;

      if (!groups[groupId]) {
        var title = section.dataset.altGroupTitle || humanizeId(groupId);
        var heading = createSectionHeading(title, 0);
        var group = document.createElement("div");
        group.id = groupId;
        group.className = "section level2 resume-section resume-group";
        if (section.dataset.altGroupIcon) group.dataset.icon = section.dataset.altGroupIcon;

        var body = document.createElement("div");
        body.className = "section-body";
        var subsections = document.createElement("div");
        subsections.className = "resume-subsections";
        body.appendChild(subsections);
        group.appendChild(heading.heading);
        group.appendChild(body);
        main.insertBefore(group, section);

        groups[groupId] = {
          node: group,
          headingDepth: heading.headingDepth,
          subsections: subsections,
          count: 0
        };
      }

      var groupData = groups[groupId];
      var subsection = convertToSubsection(section, groupData.headingDepth);
      groupData.subsections.appendChild(subsection.node);
      groupData.count += subsection.count;
      setRecordCount(groupData.node, groupData.count);
      applySectionDensity(groupData.node, groupData.count);
    });
  }

  function convertToSubsection(section, groupHeadingDepth) {
    var titleEl = section.querySelector(".section-heading h2");
    var title = titleEl ? titleEl.textContent.trim() : humanizeId(section.id || "section");
    var count = parseInt(section.dataset.recordCount || "0", 10);
    var tools = section.querySelector(".publication-tools");
    if (tools) groupHeadingDepth.appendChild(tools);

    var items = section.querySelector(".section-items");
    if (items && items.parentNode) items.parentNode.removeChild(items);

    var subsectionHeading = document.createElement("div");
    subsectionHeading.className = "subsection-heading";
    var h3 = document.createElement("h3");
    h3.textContent = title;
    subsectionHeading.appendChild(h3);
    if (count > 0) {
      var countEl = document.createElement("span");
      countEl.className = "subsection-count";
      countEl.textContent = countLabel(count);
      subsectionHeading.appendChild(countEl);
    }

    var concise = section.classList.contains("is-concise");
    section.innerHTML = "";
    section.className = "resume-subsection" + (concise ? " is-concise" : "");
    section.appendChild(subsectionHeading);
    if (items) section.appendChild(items);

    return {
      node: section,
      count: count
    };
  }

  function renumberSections(main) {
    directChildren(main, ".resume-section").forEach(function(section, index) {
      var kicker = section.querySelector(".section-heading .section-kicker");
      if (kicker) kicker.textContent = String(index + 1).padStart(2, "0");
    });
  }

  function enhanceSections(main) {
    directChildren(main, ".section.level2").forEach(function(section) {
      if (section.id === "title" || section.id === "profile") return;
      section.classList.add("resume-section");
      var heading = directChildren(section, "h2")[0];
      var entries = directChildren(section, ".section.level3");
      var looseContent = Array.prototype.filter.call(section.childNodes, function(child) {
        if (child === heading) return false;
        if (child.nodeType === Node.ELEMENT_NODE && child.matches(".section.level3")) return false;
        return hasRenderableContent(child);
      });
      setRecordCount(section, entries.length);
      applySectionDensity(section, entries.length);
      var sectionHeading = createSectionHeading(heading, entries.length);

      var bodyWrap = document.createElement("div");
      bodyWrap.className = "section-body";
      var itemWrap = document.createElement("div");
      itemWrap.className = "section-items";
      if (looseContent.length > 0) {
        var looseWrap = document.createElement("div");
        looseWrap.className = "section-free-content";
        looseContent.forEach(function(child) {
          looseWrap.appendChild(child);
        });
        itemWrap.appendChild(looseWrap);
      }
      entries.forEach(function(entry) {
        cleanEntry(entry, section.id);
        itemWrap.appendChild(entry);
      });
      if (section.id === "peer-reviewed-publications") {
        enhancePublicationBrowsing(section, sectionHeading.headingDepth, itemWrap);
      }
      bodyWrap.appendChild(itemWrap);

      Array.prototype.slice.call(section.childNodes).forEach(function(child) {
        if (child !== sectionHeading.heading && child !== bodyWrap) child.remove();
      });
      section.appendChild(sectionHeading.heading);
      section.appendChild(bodyWrap);
    });
    groupAltSections(main);
    renumberSections(main);
  }

  function publicationYear(entry) {
    var yearEl = entry.querySelector(".entry-year");
    var year = yearEl ? yearEl.textContent.trim().match(/\d{4}/) : null;
    return year ? year[0] : "";
  }

  function enhancePublicationBrowsing(section, headingDepth, itemWrap) {
    section.classList.add("has-publication-tools");
    var entries = Array.prototype.slice.call(itemWrap.querySelectorAll(".resume-entry"));
    var countsByYear = {};
    entries.forEach(function(entry) {
      var year = publicationYear(entry);
      entry.dataset.year = year;
      if (year) countsByYear[year] = (countsByYear[year] || 0) + 1;
    });

    var currentYear = "";
    entries.forEach(function(entry) {
      var year = entry.dataset.year;
      if (!year || year === currentYear) return;
      currentYear = year;
      var heading = document.createElement("div");
      heading.className = "publication-year-break";
      heading.dataset.year = year;
      var label = document.createElement("span");
      label.textContent = year;
      var count = document.createElement("span");
      count.textContent = countsByYear[year] + (countsByYear[year] === 1 ? " publication" : " publications");
      heading.appendChild(label);
      heading.appendChild(count);
      itemWrap.insertBefore(heading, entry);
    });

    var tools = document.createElement("div");
    tools.className = "publication-tools";
    var input = document.createElement("input");
    input.type = "search";
    input.placeholder = "Search publications";
    input.setAttribute("aria-label", "Search publications");
    var clear = document.createElement("button");
    clear.type = "button";
    clear.textContent = "Clear";
    clear.hidden = true;
    tools.appendChild(input);
    tools.appendChild(clear);
    headingDepth.appendChild(tools);

    var updateFilter = function() {
      var query = input.value.trim().toLowerCase();
      var visible = 0;
      entries.forEach(function(entry) {
        var show = !query || entry.textContent.toLowerCase().indexOf(query) !== -1;
        entry.classList.toggle("is-filtered-out", !show);
        if (show) visible += 1;
      });
      itemWrap.querySelectorAll(".publication-year-break").forEach(function(heading) {
        var year = heading.dataset.year;
        var anyVisible = entries.some(function(entry) {
          return entry.dataset.year === year && !entry.classList.contains("is-filtered-out");
        });
        heading.classList.toggle("is-filtered-out", !anyVisible);
      });
      clear.hidden = !query;
      itemWrap.classList.toggle("is-filtering", Boolean(query));
      window.dispatchEvent(new CustomEvent("resumePublicationFilterChange"));
    };

    input.addEventListener("input", updateFilter);
    clear.addEventListener("click", function() {
      input.value = "";
      input.focus();
      updateFilter();
    });
  }

  function buildNav(main) {
    var nav = document.createElement("nav");
    nav.className = "resume-nav";
    var title = document.createElement("div");
    title.className = "resume-nav-title";
    title.textContent = "Sections";
    nav.appendChild(title);
    var progress = document.createElement("div");
    progress.className = "resume-progress";
    progress.innerHTML = '<span></span>';
    nav.appendChild(progress);

    directChildren(main, ".resume-section").forEach(function(section) {
      var h2 = section.querySelector(".section-heading h2");
      if (!h2 || !section.id) return;
      var link = document.createElement("a");
      link.href = "#" + section.id;
      link.textContent = h2.textContent.trim();
      nav.appendChild(link);
      var publicationSection = section.id === "peer-reviewed-publications" ?
        section :
        section.querySelector("#peer-reviewed-publications");
      if (publicationSection) {
        var years = {};
        publicationSection.querySelectorAll(".resume-entry").forEach(function(entry) {
          var yearEl = entry.querySelector(".entry-year");
          if (!yearEl) return;
          var year = publicationYear(entry);
          if (!year || years[year]) return;
          years[year] = entry.id;
        });
        var yearNav = document.createElement("ol");
        yearNav.className = "publication-year-nav";
        yearNav.setAttribute("aria-label", "Publication years");
        Object.keys(years).sort().reverse().forEach(function(year) {
          var item = document.createElement("li");
          var yearLink = document.createElement("a");
          yearLink.href = "#" + years[year];
          yearLink.textContent = year;
          yearLink.dataset.year = year;
          yearLink.dataset.entryId = years[year];
          item.appendChild(yearLink);
          yearNav.appendChild(item);
        });
        nav.appendChild(yearNav);
      }
    });
    return nav;
  }

  function revealOnScroll() {
    var reveal = Array.prototype.slice.call(document.querySelectorAll(".resume-reveal"));
    if (!("IntersectionObserver" in window)) {
      reveal.forEach(function(el) { el.classList.add("is-visible"); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    reveal.forEach(function(el) { observer.observe(el); });
  }

  function addHeadingDepth(main) {
    var reducedMotion = window.matchMedia &&
      window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reducedMotion) return;

    var wideViewport = window.matchMedia ?
      window.matchMedia("(min-width: 981px)") :
      { matches: true };
    var sections = directChildren(main, ".resume-section.has-heading-depth").map(function(section) {
      return {
        section: section,
        heading: section.querySelector(".section-heading"),
        body: section.querySelector(".section-body")
      };
    }).filter(function(item) {
      return item.heading && item.body;
    });
    if (!sections.length) return;

    var setShift = function(heading, value) {
      heading.style.setProperty("--heading-depth-y", value.toFixed(2) + "px");
    };

    var update = function() {
      if (!wideViewport.matches) {
        sections.forEach(function(item) { setShift(item.heading, 0); });
        return;
      }

      sections.forEach(function(item) {
        var rect = item.section.getBoundingClientRect();
        var headingRect = item.heading.getBoundingClientRect();
        var bodyRect = item.body.getBoundingClientRect();
        var isVisible = rect.top < window.innerHeight && rect.bottom > 0;
        var hasRoom = bodyRect.height > headingRect.height + 260;
        if (!isVisible || !hasRoom) {
          setShift(item.heading, 0);
          return;
        }

        var travel = Math.max(rect.height - window.innerHeight * 0.5, 1);
        var progress = Math.min(Math.max((window.innerHeight * 0.36 - rect.top) / travel, 0), 1);
        setShift(item.heading, progress * 18);
      });
    };

    var ticking = false;
    var requestUpdate = function() {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function() {
        ticking = false;
        update();
      });
    };

    update();
    window.addEventListener("scroll", requestUpdate, { passive: true });
    window.addEventListener("resize", requestUpdate);
    window.addEventListener("resumePublicationFilterChange", requestUpdate);
    if (wideViewport.addEventListener) {
      wideViewport.addEventListener("change", requestUpdate);
    } else if (wideViewport.addListener) {
      wideViewport.addListener(requestUpdate);
    }
  }

  function pinSectionHeadings(main) {
    var wideViewport = window.matchMedia ?
      window.matchMedia("(min-width: 981px)") :
      { matches: true };
    var headings = directChildren(main, ".resume-section").map(function(section) {
      var slot = section.querySelector(".section-heading");
      var panel = section.querySelector(".heading-depth");
      return {
        section: section,
        slot: slot,
        panel: panel
      };
    }).filter(function(item) {
      return item.slot && item.panel;
    });
    if (!headings.length) return;

    var clearPinned = function(item) {
      item.panel.classList.remove("is-pinned");
      item.panel.style.removeProperty("--heading-pin-top");
      item.panel.style.removeProperty("--heading-pin-left");
      item.panel.style.removeProperty("--heading-pin-width");
    };

    var setPinned = function(item, top, left, width) {
      item.panel.style.setProperty("--heading-pin-top", top.toFixed(2) + "px");
      item.panel.style.setProperty("--heading-pin-left", left.toFixed(2) + "px");
      item.panel.style.setProperty("--heading-pin-width", width.toFixed(2) + "px");
      item.panel.classList.add("is-pinned");
    };

    var update = function() {
      headings.forEach(function(item) {
        var panelHeight = item.panel.offsetHeight;
        item.slot.style.minHeight = panelHeight + "px";

        if (!wideViewport.matches) {
          clearPinned(item);
          item.slot.style.removeProperty("min-height");
          return;
        }

        var sectionRect = item.section.getBoundingClientRect();
        var slotRect = item.slot.getBoundingClientRect();
        var top = parseFloat(window.getComputedStyle(item.slot).top);
        if (!isFinite(top)) top = 0;

        var canPin = sectionRect.height > panelHeight + 120;
        var withinSection = sectionRect.top <= top && sectionRect.bottom > top + panelHeight + 16;
        if (canPin && withinSection) {
          setPinned(item, top, slotRect.left, slotRect.width);
        } else {
          clearPinned(item);
        }
      });
    };

    var ticking = false;
    var requestUpdate = function() {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function() {
        ticking = false;
        update();
      });
    };

    update();
    window.addEventListener("scroll", requestUpdate, { passive: true });
    window.addEventListener("resize", requestUpdate);
    window.addEventListener("resumePublicationFilterChange", requestUpdate);
    if (wideViewport.addEventListener) {
      wideViewport.addEventListener("change", requestUpdate);
    } else if (wideViewport.addListener) {
      wideViewport.addListener(requestUpdate);
    }
  }

  function activateNav(main) {
    var links = Array.prototype.slice.call(document.querySelectorAll(".resume-nav > a"));
    var byId = {};
    links.forEach(function(link) {
      byId[link.getAttribute("href").slice(1)] = link;
    });
    var sections = directChildren(main, ".resume-section").filter(function(section) {
      return Boolean(byId[section.id]);
    });
    var activeLink = null;
    var setActiveLink = function(link) {
      if (!link || link === activeLink) return;
      links.forEach(function(item) { item.classList.remove("is-active"); });
      activeLink = link;
      activeLink.classList.add("is-active");
    };
    setActiveLink(links[0] || null);
    var publicationSection = document.getElementById("peer-reviewed-publications");
    var publicationOwner = publicationSection ?
      publicationSection.closest(".resume-section") :
      null;
    var publicationOwnerHref = publicationOwner ?
      "#" + publicationOwner.id :
      "#peer-reviewed-publications";
    var publicationEntries = publicationSection ?
      Array.prototype.slice.call(publicationSection.querySelectorAll(".resume-entry")) :
      [];
    var yearLinks = Array.prototype.slice.call(document.querySelectorAll(".publication-year-nav a"));
    var setActivePublicationYear = function(year) {
      yearLinks.forEach(function(link) {
        var isActive = link.dataset.year === year;
        link.classList.toggle("is-year-active", isActive);
        if (link.parentElement) {
          link.parentElement.classList.toggle("is-year-active", isActive);
        }
      });
    };
    var updatePublicationYear = function() {
      if (!publicationSection || !yearLinks.length) return;
      if (!activeLink || activeLink.getAttribute("href") !== publicationOwnerHref) {
        setActivePublicationYear("");
        return;
      }
      var visibleEntries = publicationEntries.filter(function(entry) {
        return !entry.classList.contains("is-filtered-out");
      });
      if (!visibleEntries.length) {
        setActivePublicationYear("");
        return;
      }
      var marker = Math.min(window.innerHeight * 0.42, 380);
      var currentEntry = null;
      visibleEntries.forEach(function(entry) {
        var rect = entry.getBoundingClientRect();
        if (rect.top <= marker && rect.bottom > 0) currentEntry = entry;
      });
      if (!currentEntry) {
        currentEntry = visibleEntries.find(function(entry) {
          return entry.getBoundingClientRect().top > marker;
        }) || visibleEntries[0];
      }
      setActivePublicationYear(publicationYear(currentEntry));
    };
    yearLinks.forEach(function(link) {
      link.addEventListener("click", function() {
        setActivePublicationYear(link.dataset.year);
      });
    });
    var progressBar = document.querySelector(".resume-progress span");
    var updateProgress = function() {
      if (!progressBar || !activeLink) return;
      var progressRect = progressBar.parentElement.getBoundingClientRect();
      var linkRect = activeLink.getBoundingClientRect();
      var dotCenter = linkRect.top + 13.5;
      var height = Math.max(0, dotCenter - progressRect.top);
      progressBar.style.height = height + "px";
      updatePublicationYear();
    };

    var updateActiveSection = function() {
      if (!sections.length) {
        updateProgress();
        return;
      }
      var marker = Math.min(window.innerHeight * 0.36, 340);
      var current = sections[0];
      sections.forEach(function(section) {
        var rect = section.getBoundingClientRect();
        if (rect.top <= marker && rect.bottom > 80) {
          current = section;
        }
      });
      setActiveLink(byId[current.id]);
      updateProgress();
    };

    updateActiveSection();
    window.addEventListener("resize", updateActiveSection);
    window.addEventListener("scroll", updateActiveSection, { passive: true });
    window.addEventListener("resumePublicationFilterChange", updateActiveSection);
  }

  onReady(function() {
    var requestedHash = window.location.hash;
    if (requestedHash && "scrollRestoration" in window.history) {
      window.history.scrollRestoration = "manual";
      document.documentElement.style.scrollBehavior = "auto";
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    var aside = document.getElementById("aside");
    var main = document.getElementById("main");
    var title = document.getElementById("title");
    var profile = document.getElementById("profile");
    var metrics = document.getElementById("metrics");
    var docinfo = document.getElementById("docinfo");
    if (!aside || !main || !title || !profile || !metrics) return;

    removeDirectHeading(aside, "Aside");
    removeDirectHeading(main, "Main");
    var focus = document.getElementById("skills");
    if (focus) focus.remove();
    var railFooter = buildRailFooter(docinfo);
    if (docinfo) docinfo.remove();

    var titleHeading = directChildren(title, "h2")[0];
    if (titleHeading) {
      var h1 = document.createElement("h1");
      h1.innerHTML = titleHeading.innerHTML;
      titleHeading.replaceWith(h1);
    }

    metricize(metrics);
    enhanceSections(main);

    var site = document.createElement("div");
    site.className = "resume-site";
    var shell = document.createElement("div");
    shell.className = "resume-shell";
    var hero = document.createElement("header");
    hero.className = "resume-hero";
    var heroCopy = document.createElement("div");
    heroCopy.className = "hero-copy";
    var heroEvidence = document.createElement("div");
    heroEvidence.className = "hero-evidence";

    heroCopy.appendChild(title);
    heroCopy.appendChild(profile);
    heroCopy.appendChild(buildHeroAction());
    heroEvidence.appendChild(metrics);
    hero.appendChild(heroCopy);
    hero.appendChild(heroEvidence);

    aside.classList.add("resume-rail");
    aside.insertBefore(buildNav(main), aside.firstChild);
    aside.insertBefore(buildRailIdentity(), aside.firstChild);

    main.classList.add("resume-content");
    var mainStack = document.createElement("div");
    mainStack.className = "resume-mainstack";
    mainStack.appendChild(hero);
    mainStack.appendChild(main);

    shell.appendChild(aside);
    shell.appendChild(mainStack);
    aside.appendChild(railFooter);
    site.appendChild(shell);
    document.body.innerHTML = "";
    document.body.appendChild(site);
    document.body.classList.add("resume-ready");

    revealOnScroll();
    activateNav(main);
    addHeadingDepth(main);
    pinSectionHeadings(main);

    if (requestedHash) {
      var restoreHash = function(attempt) {
        var target = document.getElementById(requestedHash.slice(1));
        if (target) {
          document.documentElement.style.scrollBehavior = "auto";
          target.scrollIntoView({ block: "start", behavior: "auto" });
          window.scrollBy(0, -24);
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, "", window.location.pathname + window.location.search + requestedHash);
          }
        }
        if (attempt < 8) {
          window.setTimeout(function() { restoreHash(attempt + 1); }, 90);
        }
      };
      window.requestAnimationFrame(function() { restoreHash(0); });
      window.addEventListener("load", function() { restoreHash(0); });
    }
  });
})();
</script>
